<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dangal E-Library — Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body>

  <!-- Sidebar overlay for mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Navbar -->
  <nav class="els-nav">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <a href="dashboard.html" class="brand brand-center">
      <div class="brand-logo brand-logo-gray">
        <img src="Logo.png" alt="Logo">
      </div>
    </a>
    <div class="nav-actions">
      <span class="nav-user">
        <span class="user-name">—</span> &middot; <span class="user-role">—</span>
      </span>
      <button class="els-btn-nav-out" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar-icon"></div>
        <div class="u-name user-name">—</div>
        <div class="u-role user-role">—</div>
        <div class="u-id user-id">—</div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">
          <span class="nav-icon" id="nav-books-icon"></span> Books
        </a>
        <a href="profile.html">
          <span class="nav-icon" id="nav-profile-icon"></span> My Profile
        </a>
        <a href="reports.html" class="staff-only">
          <span class="nav-icon" id="nav-reports-icon"></span> Reports
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">

      <!-- Greeting Banner -->
      <div class="dangal-greeting mb-4">
        <div class="dangal-greeting-text">
          <div class="dangal-welcome">Welcome to</div>
          <div class="dangal-title">Dangal E-Library</div>
          <div class="dangal-sub">Pamantasan ng Cabuyao — Library Management System</div>
        </div>
        <div class="dangal-greeting-logo">
          <img src="Logo.png" alt="Logo">
        </div>
      </div>

      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h4 style="font-family:'Playfair Display',serif;margin:0">Book Catalog</h4>
          <p style="font-size:.82rem;color:var(--text-muted);margin:0">Browse and manage the library collection</p>
        </div>
        <button class="btn els-btn-primary staff-only" id="addBookBtn">
          <span id="add-icon-el"></span> Add Book
        </button>
      </div>

      <!-- Search & filter -->
      <div class="search-filter-bar">
        <div class="search-wrap">
          <span class="search-icon" id="search-icon-el"></span>
          <input type="text" id="searchInput" class="els-input" placeholder="Search title, author, ISBN…">
        </div>
        <select class="els-input filter-author" style="width:160px;border-radius:8px">
          <option value="">All Authors</option>
        </select>
        <select class="els-input filter-category" style="width:150px;border-radius:8px">
          <option value="">All Categories</option>
        </select>
        <button class="btn els-btn-outline" id="clearFilters" style="white-space:nowrap">
          <span id="clear-icon-el"></span> Clear
        </button>
      </div>

      <!-- Books table -->
      <div class="table-responsive">
        <table class="table els-table" id="booksTable">
          <thead>
            <tr>
              <th style="width:46px"></th>
              <th>Title</th>
              <th>Author</th>
              <th>Category</th>
              <th>Availability</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="6" class="text-center py-4 text-muted">Loading…</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="icons.js"></script>
  <script src="storage.js"></script>
  <script src="models.js"></script>
  <script src="userManager.js"></script>
  <script src="bookManager.js"></script>
  <script src="transactionManager.js"></script>
  <script src="utils.js"></script>
  <script src="login.js"></script>
  <script src="dashboard.js"></script>
  <script src="profile.js"></script>
  <script src="reports.js"></script>
  <script src="sidebar.js"></script>
  <script src="app.js"></script>
</body>

</html>
