<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dangal E-Library — Librarian Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body class="login-page">

  <nav class="login-navbar">
    <img src="pnc-header-2.png" alt="PNC">
  </nav>

  <div class="login-card">
    <div class="login-card-header">
      <img src="Dangal_E_Library System.png" alt="Dangal E-Library System" class="system-logo">
      <div class="role-tag">Librarian Portal</div>
    </div>
    <div class="login-card-body">
      <div class="mb-3">
        <label class="form-label">User ID</label>
        <input type="text" id="librarianId" class="els-input" placeholder="Enter your Librarian ID">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" id="librarianPass" class="els-input" placeholder="Enter your password">
      </div>
      <button type="button" class="login-btn">Sign In</button>
      <p class="text-center mt-3 mb-0" style="font-size:.82rem;color:var(--text-muted)">
        Don't have an account?
        <a href="#" class="signup-link fw-semibold" style="color:var(--green-800)">Register here</a>
      </p>
      <p class="text-center mt-2 mb-0" style="font-size:.8rem">
        <a href="login.html" style="color:var(--text-muted)">← Back to role selection</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="icons.js"></script>
  <script src="storage.js"></script>
  <script src="models.js"></script>
  <script src="userManager.js"></script>
  <script src="bookManager.js"></script>
  <script src="transactionManager.js"></script>
  <script src="utils.js"></script>
  <script src="login.js"></script>
  <script src="dashboard.js"></script>
  <script src="profile.js"></script>
  <script src="reports.js"></script>
  <script src="app.js"></script>
</body>

</html>
