<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dangal E-Library — Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <nav class="els-nav">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <a href="dashboard.html" class="brand brand-center">
      <div class="brand-logo brand-logo-gray">
        <img src="Logo.png" alt="Logo">
      </div>
    </a>
    <div class="nav-actions">
      <span class="nav-user">
        <span class="user-name">—</span> &middot; <span class="user-role">—</span>
      </span>
      <button class="els-btn-nav-out" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <div class="dashboard-layout">

    <aside class="sidebar">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar-icon"></div>
        <div class="u-name user-name">—</div>
        <div class="u-role user-role">—</div>
        <div class="u-id user-id">—</div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="nav-icon" id="nav-books-icon"></span> Books</a>
        <a href="profile.html" class="active"><span class="nav-icon" id="nav-profile-icon"></span> My Profile</a>
        <a href="reports.html" class="staff-only"><span class="nav-icon" id="nav-reports-icon"></span> Reports</a>
      </nav>
    </aside>

    <main class="main-content profile-page">

      <!-- Greeting Banner -->
      <div class="dangal-greeting mb-4">
        <div class="dangal-greeting-text">
          <div class="dangal-welcome">Welcome to</div>
          <div class="dangal-title">Dangal E-Library</div>
          <div class="dangal-sub">Pamantasan ng Cabuyao — Library Management System</div>
        </div>
        <div class="dangal-greeting-logo">
          <img src="Logo.png" alt="Logo">
        </div>
      </div>

      <!-- Hero card -->
      <div class="profile-hero">
        <div class="avatar" id="profile-avatar-icon"></div>
        <div class="meta">
          <h3 class="profile-name">—</h3>
          <div class="details">
            <div><span id="profile-role-icon"></span><span class="profile-role">—</span> &nbsp;·&nbsp; ID: <span
                class="profile-id">—</span></div>
            <div><span id="profile-email-icon"></span><span class="profile-email">—</span></div>
            <div><span id="profile-phone-icon"></span><span class="profile-contact">—</span></div>
            <div><span id="profile-map-icon"></span><span class="profile-address">—</span></div>
            <div style="margin-top:4px;opacity:.7;font-size:.75rem" class="profile-since">—</div>
          </div>
        </div>
        <div class="d-flex flex-column gap-2">
          <button class="btn els-btn-primary" id="editProfileBtn"><span id="edit-profile-icon"></span> Edit
            Profile</button>
          <button class="btn els-btn-danger" id="deleteProfileBtn"><span id="del-profile-icon"></span> Delete</button>
        </div>
      </div>

      <!-- Active borrows -->
      <div class="card-panel">
        <h6><span id="borrow-section-icon"></span> Currently Borrowed <span class="els-badge badge-none ms-2"
            id="activeBorrowCount">0</span></h6>
        <div class="table-responsive">
          <table class="table els-table mb-0" id="activeBorrowsTable">
            <thead>
              <tr>
                <th>Book</th>
                <th>Copy</th>
                <th>Borrowed On</th>
                <th>Due Date</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Borrow history -->
      <div class="card-panel">
        <h6><span id="history-section-icon"></span> Borrowing History</h6>
        <div class="table-responsive">
          <table class="table els-table mb-0" id="historyTable">
            <thead>
              <tr>
                <th>Book</th>
                <th>Copy</th>
                <th>Type</th>
                <th>Date</th>
                <th>Due / Returned</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="icons.js"></script>
  <script src="storage.js"></script>
  <script src="models.js"></script>
  <script src="userManager.js"></script>
  <script src="bookManager.js"></script>
  <script src="transactionManager.js"></script>
  <script src="utils.js"></script>
  <script src="login.js"></script>
  <script src="dashboard.js"></script>
  <script src="profile.js"></script>
  <script src="reports.js"></script>
  <script src="sidebar.js"></script>
  <script src="app.js"></script>
</body>

</html>
