<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dangal E-Library — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>

<body class="login-page">

  <nav class="login-navbar">
    <img src="pnc-header-2.png" alt="PNC">
  </nav>

  <div class="login-card">
    <div class="login-card-header">
      <img src="Dangal_E_Library System.png" alt="Dangal E-Library System" class="system-logo">
    </div>
    <div class="login-card-body">
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:14px;font-weight:600">Sign in as</p>

      <a href="student_login.html" class="role-btn">
        <span class="role-icon-wrap" id="ri-student"></span>
        <div>
          <div>Student</div>
          <div class="role-desc">Browse and borrow books</div>
        </div>
      </a>
      <a href="librarian_login.html" class="role-btn">
        <span class="role-icon-wrap" id="ri-librarian"></span>
        <div>
          <div>Librarian</div>
          <div class="role-desc">Manage books and transactions</div>
        </div>
      </a>
      <a href="admin_login.html" class="role-btn">
        <span class="role-icon-wrap" id="ri-admin"></span>
        <div>
          <div>Administrator</div>
          <div class="role-desc">Full system access</div>
        </div>
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="icons.js"></script>
  <script src="storage.js"></script>
  <script src="models.js"></script>
  <script src="userManager.js"></script>
  <script src="bookManager.js"></script>
  <script src="transactionManager.js"></script>
  <script src="utils.js"></script>
  <script src="login.js"></script>
  <script src="dashboard.js"></script>
  <script src="profile.js"></script>
  <script src="reports.js"></script>
  <script src="app.js"></script>
</body>

</html>
